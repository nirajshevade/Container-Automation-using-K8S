name: Build and Deploy to Kubernetes

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app
  K8S_NAMESPACE: demo-app

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: ./app
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.IMAGE_NAME }}:latest

    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.30.0'

    - name: Configure kubeconfig
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.kube"
        SECRET='${{ secrets.KUBE_CONFIG_DATA }}'

        # Accept both base64-encoded kubeconfig and raw kubeconfig YAML.
        if echo "$SECRET" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
          echo "Using base64-decoded kubeconfig from secret."
        else
          printf "%s" "$SECRET" > "$HOME/.kube/config"
          echo "Using raw kubeconfig from secret."
        fi

        chmod 600 "$HOME/.kube/config"
        kubectl config get-contexts >/dev/null

    - name: Verify cluster connectivity
      run: |
        kubectl version --client
        kubectl cluster-info

    - name: Deploy namespace resource
      run: |
        kubectl apply -f k8s/namespace.yaml

    - name: Deploy workload with current image
      run: |
        IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"
        sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml | kubectl apply -f -
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/hpa.yaml
        kubectl rollout status deployment/demo-app -n ${{ env.K8S_NAMESPACE }}
