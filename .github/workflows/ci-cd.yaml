name: Build and Deploy to Kubernetes

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app
  K8S_NAMESPACE: demo-app

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image
      id: docker_build
      uses: docker/build-push-action@v6
      with:
        context: ./app
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.IMAGE_NAME }}:latest

    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.30.0'

    - name: Configure kubeconfig
      shell: pwsh
      run: |
        $kubeDir = Join-Path $HOME ".kube"
        New-Item -ItemType Directory -Path $kubeDir -Force | Out-Null
        $kubeConfigPath = Join-Path $kubeDir "config"
        $secret = "${{ secrets.KUBE_CONFIG_DATA }}"

        # Accept both base64-encoded kubeconfig and raw kubeconfig YAML.
        try {
          $bytes = [Convert]::FromBase64String($secret)
          [IO.File]::WriteAllBytes($kubeConfigPath, $bytes)
          Write-Host "Using base64-decoded kubeconfig from secret."
        }
        catch {
          Set-Content -Path $kubeConfigPath -Value $secret -NoNewline
          Write-Host "Using raw kubeconfig from secret."
        }

        kubectl config get-contexts | Out-Null

    - name: Verify cluster connectivity
      run: |
        kubectl version --client
        kubectl cluster-info

    - name: Deploy namespace resource
      run: |
        kubectl apply -f k8s/namespace.yaml

    - name: Deploy workload with current image
      shell: pwsh
      run: |
        $image = "${{ env.IMAGE_NAME }}:${{ github.sha }}"
        (Get-Content "k8s/deployment.yaml" -Raw).Replace("IMAGE_PLACEHOLDER", $image) | kubectl apply -f -
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/hpa.yaml
        kubectl rollout status deployment/demo-app -n ${{ env.K8S_NAMESPACE }}
